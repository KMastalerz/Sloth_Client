<slh-field-shell [label]="_label()"
                 [labelPosition]="_labelPosition()!">
    <slh-input-shell  fieldContainer
                        [icon]="_icon()">
        <slh-input-button leftContainer inputButtonType="minus"/>
        <input 
            inputContainer
            type="number"
            [value]="value() ?? ''"
            [placeholder]="_placeholder() ?? ''"
            (input)="onInput($event)"/>
        <slh-input-button rightContainer inputButtonType="plus"/>
    </slh-input-shell>
</slh-field-shell>
