  <div class="slh-field"
       [class]="`sl`">
    @if (label()) {
      <label class="slh-field__label"
             [class]="labelPosition()">{{ label() }}</label>
    }
    <slh-field-message>
      <div class="slh-field__container">
        <ng-content select="[fieldContainer]"></ng-content>
        <ng-content select="[secondaryContainer]"></ng-content>
      </div>
    </slh-field-message>
  </div>
